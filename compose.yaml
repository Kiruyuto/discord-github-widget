name: "github-discord-widget-dev"

networks:
  db-network:
    driver: bridge

volumes:
  postgres-data:

services:
  bot:
    container_name: github-widget-bot
    build:
      context: .
      dockerfile: Source/GitHubWidgetBot/Dockerfile
      args:
        BUILD_CONFIGURATION: Debug
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Development}
      Database__ConnectionString: "Host=postgres;Port=5432;Database=wdgt-db;Username=postgres;Password=postgres"
      Discord__Token: ${Discord__Token:?Discord__Token is required}
      Discord__AuthorizeUrl: ${Discord__AuthorizeUrl:?Discord__AuthorizeUrl is required}
      GitHub__Token: ${GitHub__Token:?GitHub__Token is required}
      GitHub__OAuthClientId: ${GitHub__OAuthClientId:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-network

  postgres:
    container_name: postgres-db
    image: postgres:18.4-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: wdgt-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - db-network
