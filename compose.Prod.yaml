name: "github-discord-widget"

networks:
  db-network:
    driver: bridge

volumes:
  postgres-data:

services:
  bot:
    container_name: github-widget-bot
    image: ghcr.io/kiruyuto/discord-github-widget:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ${BOT_ENV_FILE:-.env}
    environment:
      DOTNET_ENVIRONMENT: Production
      Database__ConnectionString: "Host=db;Port=5432;Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - db-network

  db:
    container_name: postgres-db
    image: postgres:18.4-trixie
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - db-network
