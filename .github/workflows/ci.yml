name: "CI"

on:
  pull_request:
    types: ["opened", "reopened", "synchronize"]
  push:
    branches: ["master"]

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  dotnet-ci:
    runs-on: ["ubuntu-latest"]
    strategy:
      matrix:
        configuration: ["Debug", "Release"]
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      DOTNET_NOLOGO: "true"
      TUNIT_DISABLE_GITHUB_REPORTER: "true"
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup .NET"
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: "global.json"

      - name: "Install global tools"
        run: dotnet tool install --global dotnet-ef

      - name: "Restore dependencies"
        run: dotnet restore

      - name: "Build"
        run: dotnet build --no-restore --verbosity minimal --configuration ${{ matrix.configuration }}

      - name: "Check for pending migrations"
        run: dotnet ef migrations has-pending-model-changes --no-build --project ./Source/GitHubWidgetBot/GitHubWidgetBot.csproj --startup-project ./Source/GitHubWidgetBot/GitHubWidgetBot.csproj --context ApplicationDbContext --configuration ${{ matrix.configuration }}

      - name: "Format"
        run: dotnet format --no-restore --verbosity diagnostic --severity info --verify-no-changes

      - name: "Test"
        run: dotnet test --no-restore --no-build --verbosity diagnostic --configuration ${{ matrix.configuration }} --report-github
