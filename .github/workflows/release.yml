name: "Release"

on:
  push:
    branches: ["master"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: "Release-Please"
    runs-on: ["ubuntu-latest"]
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_created: ${{ steps.run-release-please.outputs.release_created }}
      tag_name: ${{ steps.run-release-please.outputs.tag_name }}
      version: ${{ steps.run-release-please.outputs.version }}
    steps:
      - name: "Generate App Token"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.BOT_ClientId }}
          private-key: ${{ secrets.BOT_PrivateKey }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: "Run release-please"
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: run-release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: "Echo release-please outputs"
        run: echo "$OUTPUTS"
        shell: bash
        env:
          OUTPUTS: ${{ toJSON(steps.run-release-please.outputs) }}

  release-image:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: ["release-please"]
    name: "Release Docker Image"
    runs-on: ["ubuntu-latest"]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: "Log in to GitHub Container Registry"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Get lowercase repository"
        run: echo "repository_lowercase=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"
        shell: bash

      - name: "Build and push Docker image"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Source/GitHubWidgetBot/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repository_lowercase }}:latest
            ghcr.io/${{ env.repository_lowercase }}:${{ needs.release-please.outputs.version }}
          build-args: |
            BUILD_CONFIGURATION=Release
